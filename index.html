<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Twilight Realms</title>
  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="h-full bg-slate-900 text-slate-200 flex flex-col">
  <!-- Header -->
  <header class="shrink-0 p-2 bg-slate-800 flex items-center gap-4">
    <h1 class="text-xl font-bold">Twilight Realms</h1>
    <nav class="flex gap-2 text-sm">
      <button data-panel="map" class="btn">Map</button>
      <button data-panel="inv" class="btn">Inventory</button>
      <button data-panel="craft" class="btn">Craft</button>
      <button data-panel="quests" class="btn">Quests</button>
      <button data-panel="chat" class="btn">Chat</button>
    </nav>
  </header>

  <!-- Main layout -->
  <main class="grow grid md:grid-cols-4 gap-2 p-2 overflow-hidden">
    <section id="log" class="col-span-3 bg-slate-800 p-3 rounded overflow-y-auto"></section>
    <aside id="hud" class="bg-slate-800 p-3 rounded flex flex-col gap-2">
      <div id="status" class="hud-box">HP: --/-- MP: --/--</div>
      <div id="target" class="hud-box">Target: —</div>
      <div id="party" class="hud-box">Party: —</div>
      <div id="currency" class="hud-box">Coins: 0g 0s 0c</div>
      <div id="players-box" class="hud-box">
        <div class="font-bold mb-1">Nearby Players</div>
        <div id="player-list" class="flex flex-wrap gap-1"></div>
      </div>
      <div id="npcs-box" class="hud-box">
        <div class="font-bold mb-1">Nearby NPCs</div>
        <div id="npc-list" class="flex flex-wrap gap-1"></div>
      </div>
      <div id="mobs-box" class="hud-box">
        <div class="font-bold mb-1">Nearby Mobs</div>
        <div id="mob-list" class="flex flex-wrap gap-1"></div>
      </div>
      <div id="dialogue" class="hud-box hidden"></div>
    </aside>
  </main>

  <!-- Overlay panels -->
  <div id="overlay" class="hidden fixed inset-0 bg-black/70 p-4 overflow-auto">
    <div id="map" class="panel hidden bg-slate-800 p-4 rounded mb-4"></div>
    <div id="inv" class="panel hidden bg-slate-800 p-4 rounded mb-4"></div>
    <div id="craft" class="panel hidden bg-slate-800 p-4 rounded mb-4"></div>
    <div id="quests" class="panel hidden bg-slate-800 p-4 rounded mb-4"></div>
    <div id="chat-panel" class="panel hidden bg-slate-800 p-4 rounded mb-4"></div>
    <div class="text-center">
      <button id="close-overlay" class="btn">Close</button>
    </div>
  </div>

  <!-- Hotbar for abilities -->
  <div id="hotbar" class="shrink-0 p-2 bg-slate-800 flex gap-1 overflow-x-auto"></div>

  <!-- Command input -->
  <footer class="shrink-0 p-2 bg-slate-800 flex gap-2">
    <input id="cmd" class="flex-grow bg-slate-700 p-2 rounded" placeholder="Type command or /help">
    <button id="send" class="btn">Send</button>
  </footer>

  <script type="module" src="main.js"></script>
</body>
</html>
